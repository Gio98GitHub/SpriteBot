<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiritelli</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; font-family: -apple-system, Roboto, sans-serif; }
  body {
    margin: 0;
    padding: 16px;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
  }
  h2 { margin-top: 0; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: var(--tg-theme-secondary-bg-color, #eee);
    color: var(--tg-theme-text-color, #000);
    font-weight: bold;
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #fff);
  }
  .view { display: none; }
  .view.active { display: block; }

  .option-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 12px 0;
  }
  .option-btn {
    padding: 12px;
    border: 2px solid var(--tg-theme-hint-color, #ccc);
    border-radius: 10px;
    background: transparent;
    color: var(--tg-theme-text-color, #000);
    cursor: pointer;
    font-size: 14px;
  }
  .option-btn.selected {
    border-color: var(--tg-theme-button-color, #2ea6ff);
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #fff);
  }

  .main-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #fff);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 12px;
  }

  .item-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--tg-theme-hint-color, #ddd);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .item-card button {
    background: #ff4d4d;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
  }

  .status-msg {
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    display: none;
  }
  .status-msg.success {
    background: #d4f8d4;
    color: #1a6e1a;
    display: block;
  }
  .status-msg.error {
    background: #ffd6d6;
    color: #a30000;
    display: block;
  }

  .empty {
    text-align: center;
    color: var(--tg-theme-hint-color, #999);
    padding: 24px;
  }
</style>
</head>
<body>

<h2>👻 Spiritelli</h2>

<div class="tabs">
  <button class="tab-btn active" data-view="collezione">📦 Collezione</button>
  <button class="tab-btn" data-view="aggiungi">➕ Aggiungi</button>
  <button class="tab-btn" data-view="richiedi">🔎 Cerca/Richiedi</button>
</div>

<!-- VISTA COLLEZIONE -->
<div class="view active" id="view-collezione">
  <div id="collezione-list"></div>
</div>

<!-- VISTA AGGIUNGI -->
<div class="view" id="view-aggiungi">
  <p>Tipo:</p>
  <div class="option-grid" id="aggiungi-tipi"></div>
  <p>Variante:</p>
  <div class="option-grid" id="aggiungi-varianti"></div>
  <button class="main-btn" id="btn-aggiungi">Aggiungi alla collezione</button>
  <div class="status-msg" id="aggiungi-status"></div>
</div>

<!-- VISTA RICHIEDI -->
<div class="view" id="view-richiedi">
  <p>Che tipo di spiritello stai cercando?</p>
  <div class="option-grid" id="richiedi-tipi"></div>
  <p>Quale variante?</p>
  <div class="option-grid" id="richiedi-varianti"></div>
  <button class="main-btn" id="btn-richiedi">Invia richiesta nel gruppo</button>
  <div class="status-msg" id="richiedi-status"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const initData = tg.initData || "";

let TIPI = [];
let VARIANTI = [];
let selezione = { aggiungi: { tipo: null, variante: null }, richiedi: { tipo: null, variante: null } };

// --- Navigazione tab ---
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-" + btn.dataset.view).classList.add("active");
    if (btn.dataset.view === "collezione") caricaCollezione();
  });
});

// --- Caricamento opzioni (tipi/varianti) ---
async function caricaOpzioni() {
  const res = await fetch("/api/info");
  const data = await res.json();
  TIPI = data.tipi;
  VARIANTI = data.varianti;

  renderOpzioni("aggiungi-tipi", TIPI, "aggiungi", "tipo");
  renderOpzioni("aggiungi-varianti", VARIANTI, "aggiungi", "variante");
  renderOpzioni("richiedi-tipi", TIPI, "richiedi", "tipo");
  renderOpzioni("richiedi-varianti", VARIANTI, "richiedi", "variante");
}

function renderOpzioni(containerId, opzioni, contesto, campo) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  opzioni.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.addEventListener("click", () => {
      container.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selezione[contesto][campo] = opt;
    });
    container.appendChild(btn);
  });
}

// --- Collezione ---
async function caricaCollezione() {
  const list = document.getElementById("collezione-list");
  list.innerHTML = "Caricamento...";

  const res = await fetch("/api/collezione?init_data=" + encodeURIComponent(initData));
  if (!res.ok) {
    list.innerHTML = '<div class="empty">Errore di autenticazione.</div>';
    return;
  }
  const data = await res.json();

  if (data.length === 0) {
    list.innerHTML = '<div class="empty">La tua collezione è vuota.<br>Vai su "Aggiungi" per inserire uno spiritello.</div>';
    return;
  }

  list.innerHTML = "";
  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "item-card";
    card.innerHTML = `
      <span>${item.tipo} - ${item.variante}</span>
      <button data-id="${item.id}">Elimina</button>
    `;
    card.querySelector("button").addEventListener("click", async () => {
      await fetch("/api/elimina", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ init_data: initData, id: item.id })
      });
      caricaCollezione();
    });
    list.appendChild(card);
  });
}

// --- Aggiungi ---
document.getElementById("btn-aggiungi").addEventListener("click", async () => {
  const { tipo, variante } = selezione.aggiungi;
  const status = document.getElementById("aggiungi-status");

  if (!tipo || !variante) {
    status.className = "status-msg error";
    status.textContent = "Seleziona tipo e variante.";
    return;
  }

  const res = await fetch("/api/aggiungi", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ init_data: initData, tipo, variante })
  });
  const data = await res.json();

  if (data.ok) {
    status.className = "status-msg success";
    status.textContent = "Spiritello aggiunto alla collezione!";
    tg.HapticFeedback?.notificationOccurred("success");
  } else {
    status.className = "status-msg error";
    status.textContent = "Errore: " + (data.error || "riprova");
  }
});

// --- Richiedi ---
document.getElementById("btn-richiedi").addEventListener("click", async () => {
  const { tipo, variante } = selezione.richiedi;
  const status = document.getElementById("richiedi-status");

  if (!tipo || !variante) {
    status.className = "status-msg error";
    status.textContent = "Seleziona tipo e variante.";
    return;
  }

  const res = await fetch("/api/richiedi", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ init_data: initData, tipo, variante })
  });
  const data = await res.json();

  if (data.ok) {
    status.className = "status-msg success";
    status.textContent = "Richiesta inviata nel gruppo!";
    tg.HapticFeedback?.notificationOccurred("success");
  } else {
    status.className = "status-msg error";
    status.textContent = "Errore: " + (data.error || "riprova");
  }
});

// --- Init ---
caricaOpzioni();
caricaCollezione();
</script>
</body>
</html>
