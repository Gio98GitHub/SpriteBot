    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ SpiriBot</title>

    <style>
        :root {
            --bg-color: #12121a;
            --card-bg: #1e1e2f;
            --text-color: #ffffff;
            --text-muted: #a0a0b5;
            --primary-grad: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --accent-grad: linear-gradient(135deg, #b134ff 0%, #ff007f 100%);
            --danger: #ff4757;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            text-align: center;
            user-select: none; 
            -webkit-user-select: none;
        }

        h1, h2, h3 { font-family: 'Fredoka', sans-serif; letter-spacing: 0.5px; margin-bottom: 20px; }
        h1 { font-size: 28px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; background: var(--card-bg); border-radius: 15px; padding: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-family: 'Fredoka', sans-serif; font-size: 15px; border-radius: 10px; transition: all 0.3s ease; cursor: pointer; }
        .tab-btn.active { background: var(--primary-grad); color: #fff; box-shadow: 0 4px 10px rgba(79, 172, 254, 0.4); }

        .section { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 15px; margin-bottom: 25px; }

        .btn { padding: 15px 10px; border: 2px solid #2a2a3f; background: #232336; color: var(--text-color); border-radius: 15px; cursor: pointer; font-family: 'Fredoka', sans-serif; font-size: 15px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:hover:not(.disabled) { border-color: #4facfe; transform: translateY(-2px); }
        .btn.selected { background: var(--accent-grad); border-color: transparent; color: white; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); }
        .btn.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(100%) brightness(0.6); border-color: #1e1e2f; }
