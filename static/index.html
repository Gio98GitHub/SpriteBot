<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ SpiriBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12121a;
            --card-bg: #1e1e2f;
            --text-color: #ffffff;
            --text-muted: #a0a0b5;
            --primary-grad: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --accent-grad: linear-gradient(135deg, #b134ff 0%, #ff007f 100%);
            --danger: #ff4757;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        h1, h2, h3 { font-family: 'Fredoka', sans-serif; letter-spacing: 0.5px; margin-bottom: 20px; }
        h1 { font-size: 28px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; background: var(--card-bg); border-radius: 15px; padding: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-family: 'Fredoka', sans-serif; font-size: 15px; border-radius: 10px; transition: all 0.3s ease; cursor: pointer; }
        .tab-btn.active { background: var(--primary-grad); color: #fff; box-shadow: 0 4px 10px rgba(79, 172, 254, 0.4); }

        .section { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 15px; margin-bottom: 25px; }

        .btn { padding: 15px 10px; border: 2px solid #2a2a3f; background: #232336; color: var(--text-color); border-radius: 15px; cursor: pointer; font-family: 'Fredoka', sans-serif; font-size: 15px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:hover:not(.disabled) { border-color: #4facfe; transform: translateY(-2px); }
        .btn.selected { background: var(--accent-grad); border-color: transparent; color: white; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); }
        .btn.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(100%) brightness(0.6); border-color: #1e1e2f; }

        .type-container { margin-bottom: 30px; text-align: left; }
        .type-title { font-family: 'Fredoka', sans-serif; font-size: 20px; color: #fff; margin-bottom: 15px; border-bottom: 2px solid #35354e; padding-bottom: 8px; display: flex; align-items: center; }
        .type-count { background: #35354e; color: #fff; font-size: 12px; padding: 3px 8px; border-radius: 10px; margin-left: 10px; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 15px; }

        .spiritello-card { background: #232336; border: 2px solid #35354e; border-radius: 16px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; height: 120px; box-sizing: border-box; }
        .spiritello-card:hover { border-color: #4facfe; transform: translateY(-4px); }
        .card-icon { font-size: 45px; margin-bottom: 10px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
        .card-variant { font-family: 'Fredoka', sans-serif; font-size: 13px; color: var(--text-color); background: rgba(0,0,0,0.3); padding: 5px 8px; border-radius: 8px; width: 90%; text-align: center; word-wrap: break-word; }

        .card-delete { position: absolute; top: -6px; right: -6px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .card-delete:hover { transform: scale(1.1); background: #ff1e33; }

        .action-btn { width: 100%; padding: 18px; background: var(--primary-grad); color: white; border: none; border-radius: 15px; font-family: 'Fredoka', sans-serif; font-size: 18px; display: none; cursor: pointer; box-shadow: 0 5px 20px rgba(79, 172, 254, 0.5); transition: 0.2s; margin-top: 20px; }
        .action-btn:active { transform: scale(0.96); }
        .form-titolo { margin-bottom: 5px; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>

    <h1 id="mainTitle">✨ SpiriBot</h1>

    <div class="tabs" id="tabContainer">
        <button class="tab-btn active" data-tab="collezione">🎒 Collezione</button>
        <button class="tab-btn" data-tab="aggiungi">➕ Aggiungi</button>
        <button class="tab-btn" data-tab="cerca">🔍 Cerca</button>
    </div>

    <div id="collezione" class="section active">
        <div id="tipiList"></div>
    </div>

    <div id="aggiungi" class="section">
        <div class="form-titolo">Fase 1</div>
        <h3>Seleziona lo Spiritello</h3>
        <div class="grid" id="gridTipiAggiungi"></div>

        <div id="containerVariantiAggiungi" style="display: none;">
            <div class="form-titolo">Fase 2</div>
            <h3 id="titoloVariantiAggiungi">Scegli la Variante</h3>
            <div class="grid" id="gridVariantiAggiungi"></div>
        </div>

        <button id="btnConfermaAggiungi" class="action-btn">➕ Salva nell'Inventario</button>
    </div>

    <div id="cerca" class="section">
        <div class="form-titolo">Cosa stai cercando?</div>
        <h3>Seleziona lo Spiritello</h3>
        <div class="grid" id="gridTipiCerca"></div>

        <div id="containerVariantiCerca" style="display: none;">
            <div class="form-titolo">Che variante vuoi?</div>
            <h3 id="titoloVariantiCerca">Scegli la Variante</h3>
            <div class="grid" id="gridVariantiCerca"></div>
        </div>

        <button id="btnConfermaCerca" class="action-btn">📢 Invia Richiesta al Gruppo</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let initData = tg.initData || "";
        let urlParams = new URLSearchParams(window.location.search);
        let viewUser = urlParams.get('view_user');

        // Popolata dinamicamente da /api/info: { "Acqua": {icon: "💧", varianti: [{id, icon}, ...]}, ... }
        let SPIRITELLI_CONFIG = {};

        let statoAggiungi = { tipo: null, variante: null };
        let statoCerca = { tipo: null, variante: null };
        let collezioneAttuale = {};

        if (viewUser) {
            document.getElementById('mainTitle').innerText = `👀 Collezione di @${viewUser}`;
            document.getElementById('tabContainer').style.display = 'none';
        }

        // ---------------- TAB NAVIGATION ----------------

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab, btn));
        });

        function switchTab(tabId, btnElement) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');

            if (tabId === 'collezione') loadCollezione();
        }

        // ---------------- CARICAMENTO CONFIGURAZIONE ----------------

        async function caricaConfigurazione() {
            try {
                const res = await fetch('/api/info');
                SPIRITELLI_CONFIG = await res.json();
            } catch (e) {
                console.error("Errore caricamento configurazione", e);
                SPIRITELLI_CONFIG = {};
            }
            creaGrigliaTipi('gridTipiAggiungi', 'aggiungi');
            creaGrigliaTipi('gridTipiCerca', 'cerca');
        }

        // ---------------- GRIGLIA TIPI (FASE 1) ----------------

        function creaGrigliaTipi(containerId, tab) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            Object.keys(SPIRITELLI_CONFIG).forEach(tipoId => {
                const dati = SPIRITELLI_CONFIG[tipoId];
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.setAttribute('data-id', tipoId);
                btn.innerHTML = `${dati.icon} ${tipoId}`;
                btn.onclick = () => selezionaTipo(tab, tipoId, btn, containerId);
                container.appendChild(btn);
            });
        }

        // ---------------- GRIGLIA VARIANTI (FASE 2, dinamica per tipo) ----------------

        function creaGrigliaVarianti(tab, tipoId) {
            const containerId = `gridVarianti${capitalize(tab)}`;
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const varianti = SPIRITELLI_CONFIG[tipoId]?.varianti || [];

            varianti.forEach(v => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.setAttribute('data-id', v.id);
                btn.innerHTML = `${v.icon} ${v.id}`;
                btn.onclick = () => selezionaVariante(tab, v.id, btn, containerId);
                container.appendChild(btn);
            });
        }

        // ---------------- DISABILITA COMBINAZIONI GIA' POSSEDUTE ----------------

        function aggiornaStatoPulsanti() {
            // Disabilita un tipo solo se l'utente possiede TUTTE le varianti disponibili per quel tipo
            document.querySelectorAll('#gridTipiAggiungi .btn').forEach(btn => {
                const tipoId = btn.getAttribute('data-id');
                const varianti = SPIRITELLI_CONFIG[tipoId]?.varianti || [];
                const possedute = collezioneAttuale[tipoId] || [];
                if (possedute.length >= varianti.length && varianti.length > 0) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            });

            // Disabilita le varianti già possedute per il tipo selezionato
            if (statoAggiungi.tipo) {
                document.querySelectorAll('#gridVariantiAggiungi .btn').forEach(btn => {
                    const varId = btn.getAttribute('data-id');
                    const possedute = collezioneAttuale[statoAggiungi.tipo] || [];
                    if (possedute.includes(varId)) {
                        btn.classList.add('disabled');
                    } else {
                        btn.classList.remove('disabled');
                    }
                });
            }
        }

        // ---------------- SELEZIONE ----------------

        function selezionaTipo(tab, tipoId, btnElement, containerId) {
            if (btnElement.classList.contains('disabled')) return;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            let stato = (tab === 'aggiungi') ? statoAggiungi : statoCerca;
            stato.tipo = tipoId;
            stato.variante = null;

            document.querySelectorAll(`#${containerId} .btn`).forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Costruisci la griglia varianti specifica per questo tipo
            creaGrigliaVarianti(tab, tipoId);

            const cap = capitalize(tab);
            document.getElementById(`containerVarianti${cap}`).style.display = 'block';
            document.getElementById(`titoloVariantiAggiungi`) && (document.getElementById(`titoloVariantiAggiungi`).innerText = `Varianti di ${tipoId}`);
            if (tab === 'cerca') {
                document.getElementById(`titoloVariantiCerca`).innerText = `Varianti di ${tipoId}`;
            }
            document.getElementById(`btnConferma${cap}`).style.display = 'none';

            if (tab === 'aggiungi') aggiornaStatoPulsanti();
        }

        function selezionaVariante(tab, varianteId, btnElement, containerId) {
            if (btnElement.classList.contains('disabled')) return;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            let stato = (tab === 'aggiungi') ? statoAggiungi : statoCerca;
            stato.variante = varianteId;

            document.querySelectorAll(`#${containerId} .btn`).forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');

            document.getElementById(`btnConferma${capitalize(tab)}`).style.display = 'block';
        }

        function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

        // ---------------- CARICAMENTO COLLEZIONE ----------------

        async function loadCollezione() {
            const container = document.getElementById('tipiList');
            container.innerHTML = '<p style="color: var(--text-muted);">Sincronizzazione libreria... ⏳</p>';
            let datiGrezzi = [];

            try {
                const endpoint = viewUser ? `/api/collezione_utente?username=${viewUser}` : '/api/collezione';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: initData })
                });
                if (res.ok) {
                    const json = await res.json();
                    datiGrezzi = json.spiritelli || [];
                }
            } catch (e) {
                console.error("Errore di caricamento", e);
                datiGrezzi = [];
            }

            const raggruppati = {};
            datiGrezzi.forEach(item => {
                let t = item.tipo;
                let v = item.variante;
                if (!raggruppati[t]) raggruppati[t] = [];
                raggruppati[t].push(v);
            });

            collezioneAttuale = raggruppati;
            aggiornaStatoPulsanti();

            container.innerHTML = '';
            const ordineTipi = Object.keys(SPIRITELLI_CONFIG);
            let nomiTipi = Object.keys(raggruppati).sort((a, b) => ordineTipi.indexOf(a) - ordineTipi.indexOf(b));

            if (nomiTipi.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); font-size: 18px; margin-top:30px;">Inventario vuoto 💨</p>';
                return;
            }

            nomiTipi.forEach(tipoStringa => {
                let icona = SPIRITELLI_CONFIG[tipoStringa]?.icon || '✨';
                let varianti = SPIRITELLI_CONFIG[tipoStringa]?.varianti || [];
                let ordineVarianti = varianti.map(v => v.id);

                let typeContainer = document.createElement('div');
                typeContainer.className = 'type-container';

                let title = document.createElement('div');
                title.className = 'type-title';
                title.innerHTML = `${icona} Spiritello ${tipoStringa} <span class="type-count">${raggruppati[tipoStringa].length}</span>`;
                typeContainer.appendChild(title);

                let grid = document.createElement('div');
                grid.className = 'library-grid';

                let variantiOrdinate = raggruppati[tipoStringa].sort((a, b) => ordineVarianti.indexOf(a) - ordineVarianti.indexOf(b));

                variantiOrdinate.forEach(varianteStringa => {
                    let vIcon = varianti.find(v => v.id === varianteStringa)?.icon || '✨';
                    let card = document.createElement('div');
                    card.className = 'spiritello-card';
                    card.innerHTML = `<div class="card-icon">${vIcon}</div><div class="card-variant">${varianteStringa}</div>`;

                    if (!viewUser) {
                        let delBtn = document.createElement('button');
                        delBtn.className = 'card-delete';
                        delBtn.innerText = '✖';
                        delBtn.onclick = () => elimina(tipoStringa, varianteStringa);
                        card.appendChild(delBtn);
                    }
                    grid.appendChild(card);
                });

                typeContainer.appendChild(grid);
                container.appendChild(typeContainer);
            });
        }

        // ---------------- AZIONI: AGGIUNGI / CERCA ----------------

        document.getElementById('btnConfermaAggiungi').addEventListener('click', () => inviaDati('aggiungi'));
        document.getElementById('btnConfermaCerca').addEventListener('click', () => inviaDati('cerca'));

        async function inviaDati(tab) {
            const stato = tab === 'aggiungi' ? statoAggiungi : statoCerca;
            const endpoint = tab === 'aggiungi' ? '/api/aggiungi' : '/api/richiedi';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tipo: stato.tipo, variante: stato.variante, initData: initData })
                });

                if (!res.ok) throw new Error("Errore server");
                processaAggiunta(tab);
            } catch (e) {
                tg.showAlert('❌ Impossibile comunicare col server.');
            }
        }

        function processaAggiunta(tab) {
            tg.showAlert(tab === 'aggiungi' ? '✅ Aggiunto alla collezione!' : '📢 Annuncio inviato nel gruppo!');
            if (tab === 'aggiungi') {
                statoAggiungi = { tipo: null, variante: null };
                document.getElementById('containerVariantiAggiungi').style.display = 'none';
                document.getElementById('btnConfermaAggiungi').style.display = 'none';
                document.querySelectorAll('#aggiungi .btn').forEach(b => b.classList.remove('selected'));
                document.querySelector('.tab-btn[data-tab="collezione"]').click();
            } else {
                statoCerca = { tipo: null, variante: null };
                document.getElementById('containerVariantiCerca').style.display = 'none';
                document.getElementById('btnConfermaCerca').style.display = 'none';
                document.querySelectorAll('#cerca .btn').forEach(b => b.classList.remove('selected'));
            }
        }

        // ---------------- ELIMINAZIONE ----------------

        function elimina(tipo, variante) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            tg.showConfirm(`Rimuovere lo Spiritello ${tipo} (${variante}) dall'inventario?`, async (agreed) => {
                if (agreed) {
                    try {
                        const res = await fetch('/api/elimina', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ tipo: tipo, variante: variante, initData: initData })
                        });
                        if (res.ok) {
                            tg.showAlert('🗑️ Rimosso!');
                            loadCollezione();
                        } else {
                            tg.showAlert('❌ Errore durante la rimozione.');
                        }
                    } catch (e) {
                        tg.showAlert('❌ Errore di rete.');
                    }
                }
            });
        }

        // ---------------- INIT ----------------

        (async function init() {
            await caricaConfigurazione();
            await loadCollezione();
        })();
    </script>
</body>
</html>
